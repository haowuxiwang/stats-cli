name: CI
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.10', '3.11', '3.12']
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-test.txt
    - name: Run tests with coverage
      run: python -m pytest tests/ -v --cov=stats_engine --cov-report=term-missing --cov-fail-under=93
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install ruff
      run: pip install ruff
    - name: Run ruff check
      run: ruff check .
    - name: Run ruff format check
      run: ruff format --check .

  security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install bandit
      run: pip install bandit
    - name: Run bandit security scan
      run: bandit -r stats_engine/ utils/ main.py -ll --skip B101,B102,B301,B303 -x tests/,examples/
    - name: Run full scan (informational)
      run: bandit -r stats_engine/ utils/ main.py -iii -x tests/,examples/ || true
      continue-on-error: true

  performance:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest-benchmark
    - name: Run benchmarks
      run: |
        python -m pytest tests/ -k "benchmark" --benchmark-only --benchmark-json=benchmark-output.json --benchmark-min-rounds=3 || echo "No benchmarks found, skipping"
    - name: Check for performance regression (>3x baseline)
      run: |
        python -c "
        import json, sys
        try:
            with open('benchmark-output.json') as f:
                data = json.load(f)
        except (FileNotFoundError, json.JSONDecodeError):
            print('No benchmark data found, skipping regression check')
            sys.exit(0)

        if not data.get('benchmarks'):
            print('No benchmarks found in output')
            sys.exit(0)

        regressions = []
        baseline_file = '.benchmarks/baseline.json'
        try:
            with open(baseline_file) as f:
                baseline = json.load(f)
        except (FileNotFoundError, json.JSONDecodeError):
            print(f'No baseline file at {baseline_file}, skipping comparison')
            sys.exit(0)

        baseline_map = {b['name']: b['stats']['mean'] for b in baseline.get('benchmarks', [])}
        for bench in data.get('benchmarks', []):
            name = bench['name']
            current_mean = bench['stats']['mean']
            if name in baseline_map:
                bmean = baseline_map[name]
                ratio = current_mean / bmean if bmean > 0 else 0
                if ratio > 3.0:
                    regressions.append(f'{name}: {ratio:.2f}x slower ({bmean:.4f}s -> {current_mean:.4f}s)')

        if regressions:
            print('PERFORMANCE REGRESSION DETECTED (>3x baseline):')
            for r in regressions:
                print(f'  - {r}')
            sys.exit(1)
        else:
            print('No performance regressions detected (all within 3x baseline)')
        "
    - name: Upload benchmark results
      uses: actions/upload-artifact@v4
      with:
        name: benchmark-results
        path: benchmark-output.json
      if: always()
